services:
  - type: web
    name: mpt-demo
    runtime: python
    plan: free
    buildCommand: |
      python -m pip install --upgrade pip
      python -m pip install -e ".[web]"
      cd web
      npm ci
      npm run build
    startCommand: |
      uvicorn api_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: NODE_VERSION
        value: "20"
